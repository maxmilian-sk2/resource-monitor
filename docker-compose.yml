services:
  app:
    image: webdevops/php-nginx:8.3
    ports:
      - "8080:80"
    volumes:
      - ./:/app
    environment:
      WEB_DOCUMENT_ROOT: /app
      PHP_DISPLAY_ERRORS: 1
      DB_HOST: db
      DB_NAME: resmon
      DB_USER: resmon
      DB_PASS: resmon
    depends_on:
      - db

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootsecret
      MARIADB_DATABASE: resmon
      MARIADB_USER: resmon
      MARIADB_PASSWORD: resmon
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

volumes:
  db_data:
